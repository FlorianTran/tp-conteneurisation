apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: boutique
  labels:
    app: catalogue
spec:
  replicas: 2
  # RollingUpdate : deploiement sans downtime (au plus 1 pod indispo,
  # au plus 1 pod surnumeraire pendant la transition).
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: catalogue
  template:
    metadata:
      labels:
        app: catalogue
    spec:
      serviceAccountName: catalogue-sa
      automountServiceAccountToken: false
      # Durcissement PSS restricted au niveau pod.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: catalogue
          image: ghcr.io/floriantran/projet-final-catalogue:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: catalogue-config
            - secretRef:
                name: app-secret
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        # readOnlyRootFilesystem: true -> on fournit un emptyDir writable pour /tmp.
        - name: tmp
          emptyDir: {}
