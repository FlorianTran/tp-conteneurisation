apiVersion: v1
kind: Namespace
metadata:
  name: boutique
  labels:
    app.kubernetes.io/part-of: projet-final
    # PSS : enforce baseline (Postgres officiel ne passe pas restricted sans bricolage),
    # warn + audit en restricted pour signaler les pods app non-conformes sans les bloquer.
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
