# init.sql monte dans /docker-entrypoint-initdb.d du conteneur Postgres.
# Ce ConfigMap est genere par deploy.sh a partir de db/init.sql (kubectl create configmap
# --from-file) pour rester la source unique. Version ci-dessous = copie de reference.
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: boutique
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS products (
      id SERIAL PRIMARY KEY,
      name TEXT NOT NULL,
      price NUMERIC(10, 2) NOT NULL
    );

    CREATE TABLE IF NOT EXISTS orders (
      id SERIAL PRIMARY KEY,
      product_id INTEGER NOT NULL REFERENCES products (id),
      quantity INTEGER NOT NULL CHECK (quantity >= 1),
      created_at TIMESTAMPTZ NOT NULL DEFAULT now()
    );

    INSERT INTO products (name, price) VALUES
      ('Clavier mecanique', 89.90),
      ('Souris ergonomique', 45.00),
      ('Ecran 27 pouces', 249.99),
      ('Casque audio', 129.50)
    ON CONFLICT DO NOTHING;
