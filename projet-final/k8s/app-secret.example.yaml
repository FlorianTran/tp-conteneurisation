# TEMPLATE - credentials DB cote applications (catalogue + orders).
# Le vrai app-secret.yaml est gitignore ; deploy.sh le cree via kubectl create secret.
# Memes valeurs que postgres-secret (l'app se connecte avec le meme compte).
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: boutique
type: Opaque
stringData:
  DB_USER: boutique_app
  DB_PASSWORD: changeme-en-local
  DB_NAME: boutique
