# Config nginx pour l'image nginx-unprivileged (UID 101, port 8080).
# Tous les chemins temporaires pointent vers /tmp car le conteneur tourne
# avec readOnlyRootFilesystem: true (PSS restricted).
worker_processes auto;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  client_body_temp_path /tmp/client_temp;
  proxy_temp_path /tmp/proxy_temp;
  fastcgi_temp_path /tmp/fastcgi_temp;
  uwsgi_temp_path /tmp/uwsgi_temp;
  scgi_temp_path /tmp/scgi_temp;

  access_log /dev/stdout;
  error_log /dev/stderr warn;

  server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Sonde pour les probes k8s.
    location = /healthz {
      access_log off;
      return 200 "ok\n";
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
